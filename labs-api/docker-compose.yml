services:
  labs-api:
    build: .
    container_name: labs-api
    restart: unless-stopped
    ports:
      - "4001:4000" # Host:Container — 4001 weil 4000 schon belegt
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@host.docker.internal:${DB_PORT:-5433}/labs_db
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FAL_KEY: ${FAL_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    extra_hosts:
      - "host.docker.internal:host-gateway" # Container kann VPS-Host-Postgres erreichen
    networks:
      - proxy-netz

networks:
  proxy-netz:
    external: true # Bestehendes Nginx Proxy Manager Netz
